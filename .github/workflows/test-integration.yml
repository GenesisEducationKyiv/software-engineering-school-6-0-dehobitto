name: 'Test: Integration'

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Pull test containers
        run: |
          for image in postgres:16-alpine testcontainers/ryuk:0.13.0; do
            for attempt in 1 2 3; do
              docker pull "$image" && break
              if [ "$attempt" = "3" ]; then
                exit 1
              fi
              sleep 10
            done
          done

      - name: Test
        run: go test -race -v -tags integration ./tests/integration/...
