# Overlay file for the ELK logging stack. Always use together with the base compose file:
#   docker compose -f docker-compose.yml -f docker-compose.logging.yml up -d
#
# The 'subber' service defined here adds only 'depends_on: rabbitmq' to the base definition.
services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: subber_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: subber_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  logstash:
    image: logstash:8.13.0
    container_name: subber_logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  kibana:
    image: kibana:8.13.0
    container_name: subber_kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  subber:
    depends_on:
      rabbitmq:
        condition: service_healthy
