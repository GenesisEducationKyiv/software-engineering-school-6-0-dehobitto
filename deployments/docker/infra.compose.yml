services:
  kafka:
    image: apache/kafka:3.9.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka-topics-init:
    image: apache/kafka:3.9.1
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/sh
      - -ec
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic subber.watchlist.saga.requests --partitions 3 --replication-factor 1 --config retention.ms=604800000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic subber.watchlist.saga.commands --partitions 3 --replication-factor 1 --config retention.ms=604800000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic subber.watchlist.saga.events --partitions 3 --replication-factor 1 --config retention.ms=604800000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic subber.watchlist.commands.dlq --partitions 3 --replication-factor 1 --config retention.ms=1209600000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic subber.release.events --partitions 3 --replication-factor 1 --config retention.ms=604800000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic subber.notification.commands --partitions 6 --replication-factor 1 --config retention.ms=604800000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic subber.notification.retry.1m --partitions 6 --replication-factor 1 --config retention.ms=604800000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic subber.notification.retry.10m --partitions 6 --replication-factor 1 --config retention.ms=604800000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic subber.notification.dlq --partitions 3 --replication-factor 1 --config retention.ms=1209600000

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    command:
      - --kafka.server=kafka:9092
    ports:
      - "9308:9308"
    depends_on:
      kafka:
        condition: service_healthy

  redis:
    image: redis:8.8-m03-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  postgres-api:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: subber_api
    ports:
      - "5430:5432"
    volumes:
      - pgdata_api:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d subber_api -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  postgres-scanner:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: subber_scanner
    ports:
      - "5431:5432"
    volumes:
      - pgdata_scanner:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d subber_scanner -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  postgres-notifier:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: subber_notifier
    ports:
      - "5432:5432"
    volumes:
      - pgdata_notifier:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d subber_notifier -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.2
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"

  kibana:
    image: docker.elastic.co/kibana/kibana:9.2.2
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_SECURITY_ENABLED: "false"
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  kibana-import:
    image: curlimages/curl:8.11.1
    volumes:
      - ./kibana/dashboards.ndjson:/tmp/dashboards.ndjson:ro
    depends_on:
      kibana:
        condition: service_started
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        for attempt in $$(seq 1 60); do
          if curl -sf -X POST "http://kibana:5601/api/saved_objects/_import?overwrite=true" \
            -H "kbn-xsrf: true" \
            --form file=@/tmp/dashboards.ndjson >/tmp/kibana-import.json \
            && curl -sf "http://kibana:5601/api/saved_objects/dashboard/subber-main-dashboard" >/dev/null; then
            exit 0
          fi
          echo "waiting for kibana import API ($$attempt/60)"
          sleep 2
        done
        exit 1

  vector:
    image: timberio/vector:0.49.0-alpine
    volumes:
      - ./vector/vector.yaml:/etc/vector/vector.yaml:ro
    command: ["--config", "/etc/vector/vector.yaml"]
    ports:
      - "8686:8686"
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      - elasticsearch

  prometheus:
    image: prom/prometheus:v3.8.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - subscription-api
      - scanner-service
      - notification-service

  grafana:
    image: grafana/grafana:12.3.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata_api:
  pgdata_scanner:
  pgdata_notifier:
