global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: subscription-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - subscription-api:8080

  - job_name: scanner-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - scanner-service:8081

  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - notification-service:8082
