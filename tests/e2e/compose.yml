services:
  wiremock:
    image: wiremock/wiremock:3.9.1
    volumes:
      - ./tests/e2e/wiremock:/home/wiremock:ro
    command: ["--global-response-templating"]

  subscription-api:
    environment:
      API_KEY: test-key
      GITHUB_BASE_URL: http://wiremock:8080
      LOG_SIDECAR_ENABLED: "false"
    depends_on:
      wiremock:
        condition: service_started

  scanner-service:
    environment:
      GITHUB_BASE_URL: http://wiremock:8080
      LOG_SIDECAR_ENABLED: "false"
    depends_on:
      wiremock:
        condition: service_started

  notification-service:
    environment:
      LOG_SIDECAR_ENABLED: "false"

  subscription-api-outbox-relay:
    environment:
      API_KEY: test-key
      GITHUB_BASE_URL: http://wiremock:8080
      LOG_SIDECAR_ENABLED: "false"

  scanner-service-outbox-relay:
    environment:
      GITHUB_BASE_URL: http://wiremock:8080
      LOG_SIDECAR_ENABLED: "false"

  notification-service-outbox-relay:
    environment:
      LOG_SIDECAR_ENABLED: "false"

  e2e:
    build:
      context: .
      dockerfile: tests/e2e/Dockerfile
    environment:
      APP_URL: http://subscription-api:8080
      API_KEY: test-key
      CI: "true"
    depends_on:
      subscription-api:
        condition: service_started
      notification-service:
        condition: service_started
    command:
      - /bin/bash
      - -lc
      - |
        node -e "const http=require('http'); const checks=[['subscription-api','http://subscription-api:8080/',s=>s>=200&&s<500],['notification-service','http://notification-service:8083/internal/notifications/confirmation',s=>s===405||s===400||s===202]]; const sleep=ms=>new Promise(r=>setTimeout(r,ms)); const probe=(url)=>new Promise((resolve,reject)=>{http.get(url,res=>{res.resume();resolve(res.statusCode);}).on('error',reject);}); (async()=>{for(const [name,url,isReady] of checks){let ready=false; for(let tries=0; tries<=60; tries++){try{const status=await probe(url); if(isReady(status)){ready=true; break;}}catch{} await sleep(2000);} if(!ready){console.error('Timed out waiting for', name, url); process.exit(1);}}})().catch(err=>{console.error(err); process.exit(1);});"
        npx playwright test
