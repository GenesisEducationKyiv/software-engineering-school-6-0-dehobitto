groups:
  - name: subber
    rules:
      - alert: SubberTargetDown
        expr: up{job="subber"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Subber Prometheus target is down"
          description: "Prometheus has not been able to scrape the Subber application for at least 1 minute."

      - alert: SubberHighHTTP5xxRatio
        expr: |
          sum(rate(http_requests_total{status_code=~"5.."}[5m]))
          /
          clamp_min(sum(rate(http_requests_total[5m])), 0.001) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Subber 5xx ratio is high"
          description: "More than 5% of HTTP requests have returned 5xx responses over the last 5 minutes."

      - alert: SubberHighHTTPP95Latency
        expr: |
          histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket[5m]))) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Subber HTTP p95 latency is high"
          description: "HTTP p95 latency has been above 2 seconds for at least 5 minutes."

      - alert: SubberEmailSendFailures
        expr: increase(emails_failed_total[10m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Subber email send failures detected"
          description: "At least one email send failure was recorded in the last 10 minutes."

      - alert: SubberLogEntriesDropped
        expr: increase(log_entries_dropped_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Subber dropped log entries"
          description: "The async logging buffer dropped at least one log entry in the last 5 minutes."

      - alert: SubberLogDeadLetterQueueNotEmpty
        expr: rabbitmq_queue_messages_ready{queue="logs.dead"} > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Subber log dead-letter queue has messages"
          description: "RabbitMQ queue logs.dead contains messages that Logstash could not process."

      - alert: SubberLogQueueBacklog
        expr: rabbitmq_queue_messages_ready{queue="logs"} > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Subber log queue backlog is growing"
          description: "RabbitMQ queue logs has more than 1000 ready messages for at least 5 minutes."
