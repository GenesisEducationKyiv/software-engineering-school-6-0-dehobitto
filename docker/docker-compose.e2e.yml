# Overlay for full frontend + backend E2E tests.
# Run with:
#   docker compose -f docker-compose.yml -f docker/docker-compose.e2e.yml up --build --abort-on-container-exit --exit-code-from e2e e2e
services:
  github-mock:
    image: wiremock/wiremock:3.10.0
    container_name: subber_github_mock
    command:
      - --global-response-templating
      - --disable-gzip
    volumes:
      - ./tests/e2e/wiremock:/home/wiremock:ro
    restart: unless-stopped

  subber:
    environment:
      - API_KEY=test-key
      - GITHUB_TOKEN=
      - GITHUB_BASE_URL=http://github-mock:8080
      - SMTP_HOST=127.0.0.1
      - SMTP_PORT=2525
      - SMTP_EMAIL=e2e@example.com
      - SMTP_PASSWORD=e2e
    depends_on:
      github-mock:
        condition: service_started

  e2e:
    build:
      context: .
      dockerfile: tests/e2e/Dockerfile
    container_name: subber_e2e
    environment:
      - APP_URL=http://subber:8080
      - API_KEY=test-key
      - CI=true
    depends_on:
      subber:
        condition: service_started
    command:
      - sh
      - -c
      - >
        until node -e "fetch(process.env.APP_URL).then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))";
        do sleep 2; done;
        npx playwright test
    restart: "no"
