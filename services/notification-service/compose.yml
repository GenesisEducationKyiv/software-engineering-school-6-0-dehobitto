services:
  notification-service-migrate:
    build:
      context: ../..
      dockerfile: services/notification-service/Dockerfile
      args:
        TARGET: ./services/notification-service/cmd/migrate
    env_file:
      - ../../deployments/docker/env/common.env.example
      - .env.example
    depends_on:
      postgres-notifier:
        condition: service_healthy

  notification-service:
    build:
      context: ../..
      dockerfile: services/notification-service/Dockerfile
    env_file:
      - ../../deployments/docker/env/common.env.example
      - .env.example
    ports:
      - "8082:8082"
    depends_on:
      kafka-topics-init:
        condition: service_completed_successfully
      postgres-notifier:
        condition: service_healthy
      notification-service-migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

  notification-service-outbox-relay:
    build:
      context: ../..
      dockerfile: services/notification-service/Dockerfile
      args:
        TARGET: ./services/notification-service/cmd/outbox-relay
    env_file:
      - ../../deployments/docker/env/common.env.example
      - .env.example
    depends_on:
      kafka-topics-init:
        condition: service_completed_successfully
      postgres-notifier:
        condition: service_healthy
      notification-service-migrate:
        condition: service_completed_successfully
